<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChicWardrobe - Fashion Store</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#">Chic<span class="text-primary">Wardrobe</span></a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarContent">
                <span class="navbar-toggler-icon"></span>
            </button>
            
            <div class="collapse navbar-collapse" id="navbarContent">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link active" href="#">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Men</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Women</a></li>
                    <li class="nav-item"><a class="nav-link" href="#">Accessories</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <button class="btn btn-outline-dark me-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#cartOffcanvas">
                        <i class="fas fa-shopping-cart"></i> Cart 
                        <span id="cart-count" class="badge bg-danger rounded-pill">0</span>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Header Banner -->
    <header class="bg-light py-5 mb-5">
        <div class="container text-center">
            <h1 class="display-4 fw-bolder">Summer Collection 2026</h1>
            <p class="lead fw-normal text-muted mb-0">Discover the latest trends in fashion</p>
        </div>
    </header>

    <!-- Main Content -->
    <div class="container mb-5">
        <div class="row">
            <!-- Sidebar / Filters -->
            <div class="col-lg-3 mb-4">
                <div class="card border-0 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title mb-4">Categories</h5>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-radio" type="radio" name="category" value="all" id="catAll" checked>
                            <label class="form-check-label" for="catAll">All Products</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-radio" type="radio" name="category" value="shirts" id="catShirts">
                            <label class="form-check-label" for="catShirts">T-Shirts</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-radio" type="radio" name="category" value="jeans" id="catJeans">
                            <label class="form-check-label" for="catJeans">Jeans</label>
                        </div>
                        <div class="form-check mb-2">
                            <input class="form-check-input filter-radio" type="radio" name="category" value="shoes" id="catShoes">
                            <label class="form-check-label" for="catShoes">Shoes</label>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Product Grid -->
            <div class="col-lg-9">
                <div class="row" id="product-container">
                    <!-- Products will be injected here by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Right Offcanvas for Cart -->
    <div class="offcanvas offcanvas-end" tabindex="-1" id="cartOffcanvas" aria-labelledby="cartOffcanvasLabel">
        <div class="offcanvas-header border-bottom">
            <h5 class="offcanvas-title" id="cartOffcanvasLabel">Your Cart</h5>
            <button type="button" class="btn-close text-reset" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="cart-items" class="flex-grow-1 overflow-auto">
                <p class="text-center text-muted mt-5" id="empty-cart-msg">Your cart is empty.</p>
                <!-- Cart items list -->
                <ul class="list-group list-group-flush" id="cart-list"></ul>
            </div>
            <div class="border-top pt-3 mt-3">
                <div class="d-flex justify-content-between mb-3 fw-bold fs-5">
                    <span>Total:</span>
                    <span id="cart-total">$0.00</span>
                </div>
                <button class="btn btn-primary w-100 py-2">Proceed to Checkout</button>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="py-4 bg-dark text-white text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 ChicWardrobe. All rights reserved.</p>
        </div>
    </footer>

    <!-- Bootstrap & JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
