<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkyCast | Premium Weather Dashboard</title>
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="clear">
    <div class="container">
        <header>
            <div class="brand">
                <h2 style="font-weight: 700;">SkyCast</h2>
                <p id="current-time" style="font-size: 0.8rem; color: var(--text-muted);"></p>
            </div>
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Search City (e.g. Mumbai)...">
                <button class="search-btn" id="search-btn">🔍</button>
            </div>
        </header>

        <main class="dashboard-grid">
            <!-- Left Side: Main Weather -->
            <section class="card main-weather" id="main-card">
                <div class="city-name" id="display-city">Loading...</div>
                <div class="date" id="display-date">----------</div>
                
                <img src="" alt="Weather" class="weather-icon" id="weather-icon">
                
                <div class="temp-large">
                    <span id="temp-val">--</span>
                    <span class="unit">°C</span>
                </div>
                
                <div class="condition" id="condition-text">---------</div>

                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="humidity-val">--%</span>
                        <span class="stat-label">Humidity</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="wind-val">-- km/h</span>
                        <span class="stat-label">Wind</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="pressure-val">----</span>
                        <span class="stat-label">Pressure</span>
                    </div>
                </div>
            </section>

            <!-- Right Side: Trends & Forecast -->
            <section class="charts-container">
                <div class="card chart-card">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem; font-weight: 600;">24H Temperature Trend</h3>
                    <div style="height: 250px;">
                        <canvas id="forecastChart"></canvas>
                    </div>
                </div>

                <div class="card">
                    <h3 style="margin-bottom: 1.5rem; font-size: 1.1rem; font-weight: 600;">5-Day Forecast</h3>
                    <div class="forecast-row" id="forecast-container">
                        <!-- Forecast items injected by JS -->
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
