<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERN Assignment Launcher</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #fbbf24;
            --bg: #000000;
            --text: #ffffff;
            --accent: #3b82f6;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Space Grotesk', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .hero {
            text-align: center;
            max-width: 600px;
            padding: 2rem;
            border: 2px solid #222;
            border-radius: 24px;
            background: linear-gradient(145deg, #0a0a0a, #111);
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge {
            background: var(--primary);
            color: black;
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-weight: 700;
            font-size: 0.8rem;
            margin-bottom: 2rem;
            display: inline-block;
        }

        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        .steps {
            text-align: left;
            margin-bottom: 2rem;
            background: #1a1a1a;
            padding: 1.5rem;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .step {
            margin-bottom: 0.5rem;
            display: flex;
            gap: 0.5rem;
        }

        .step-num {
            color: var(--primary);
            font-weight: 700;
        }

        .links {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .btn {
            padding: 0.8rem 1.5rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: transform 0.2s ease;
        }

        .btn-primary { background: white; color: black; }
        .btn-outline { border: 1px solid #444; color: white; }

        .btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="hero">
        <div class="badge">ASSIGNMENT 7</div>
        <h1>MERN Stack App</h1>
        <p>This is a full-stack Student Feedback Review System. To run this project, you need to start both the <b>Backend</b> and the <b>Frontend</b> API services.</p>
        
        <div class="steps">
            <div class="step"><span class="step-num">1.</span> <span>Open terminal in <code>/backend</code> and run <code>npm start</code></span></div>
            <div class="step"><span class="step-num">2.</span> <span>Open terminal in <code>/frontend</code> and run <code>npm run dev</code></span></div>
        </div>

        <div class="links">
            <a href="backend/index.js" class="btn btn-outline" onclick="alert('Open a terminal and run the backend first!')">View API Config</a>
            <a href="frontend/index.html" class="btn btn-primary" onclick="alert('Running via Vite is required (npm run dev)')">Launch App</a>
        </div>
    </div>
</body>
</html>
