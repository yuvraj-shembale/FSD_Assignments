<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tech University | Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(99, 102, 241, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(168, 85, 247, 0.15) 0%, transparent 40%);
            color: var(--text);
            min-height: 100vh;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
            width: 100%;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: transform 0.3s ease, border-color 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
        }

        .college-info h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            color: var(--primary);
        }

        .college-info p {
            color: var(--text-muted);
            line-height: 1.6;
            margin-bottom: 0.5rem;
        }

        .main-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 2rem;
        }

        @media (max-width: 768px) {
            .main-section {
                grid-template-columns: 1fr;
            }
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        input, select {
            width: 100%;
            padding: 0.8rem;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            outline: none;
            transition: border-color 0.3s ease;
        }

        input:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 1rem;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s ease;
        }

        button:hover {
            opacity: 0.9;
        }

        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        th {
            text-align: left;
            padding: 1rem;
            background: var(--glass);
            color: var(--text-muted);
            font-weight: 600;
        }

        td {
            padding: 1rem;
            border-bottom: 1px solid var(--border);
        }

        tr:last-child td {
            border-bottom: none;
        }

        .badge {
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.8rem;
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary);
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">TechUniversity</div>
            <div id="status-badge" class="badge">API Connected</div>
        </header>

        <div class="stats-grid">
            <div class="card college-info" id="college-details">
                <h1>College Overview</h1>
                <p>Loading college information...</p>
            </div>
            <div class="card">
                <h1 style="color: var(--secondary);">Quick Actions</h1>
                <p style="color: var(--text-muted);">Manage your university records seamlessly through this dashboard.</p>
            </div>
        </div>

        <div class="main-section">
            <div class="card">
                <h2>Add Student</h2>
                <br>
                <form id="student-form">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" required placeholder="John Doe">
                    </div>
                    <div class="form-group">
                        <label>Roll Number</label>
                        <input type="text" id="rollNumber" required placeholder="CS101">
                    </div>
                    <div class="form-group">
                        <label>Department</label>
                        <select id="department">
                            <option value="Computer Engineering">Computer Engineering</option>
                            <option value="IT">IT</option>
                            <option value="Mechanical">Mechanical</option>
                            <option value="Civil">Civil</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Year</label>
                        <input type="number" id="year" required min="1" max="4" value="1">
                    </div>
                    <button type="submit">Enroll Student</button>
                </form>
            </div>

            <div class="card">
                <h2>Student Records</h2>
                <div class="table-container">
                    <table id="student-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Roll No</th>
                                <th>Dept</th>
                                <th>Year</th>
                            </tr>
                        </thead>
                        <tbody id="student-list">
                            <!-- Students will appear here -->
                        </tbody>
                    </table>
                    <div id="loading" class="loading">Loading students...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = ''; // Same origin

        // Fetch College Info
        async function fetchInfo() {
            try {
                const res = await fetch(`${API_BASE}/api/info`);
                const data = await res.json();
                document.getElementById('college-details').innerHTML = `
                    <h1>${data.collegeName}</h1>
                    <p>📍 ${data.location}</p>
                    <p>📅 Founded: ${data.established}</p>
                    <p>🏷️ Depts: ${data.departments.join(', ')}</p>
                `;
            } catch (err) {
                console.error(err);
            }
        }

        // Fetch Students
        async function fetchStudents() {
            try {
                const res = await fetch(`${API_BASE}/api/students`);
                const students = await res.json();
                const list = document.getElementById('student-list');
                const loading = document.getElementById('loading');
                
                list.innerHTML = '';
                loading.style.display = students.length ? 'none' : 'block';
                if(!students.length) loading.innerText = 'No students found.';

                students.forEach(s => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${s.name}</td>
                        <td>${s.rollNumber}</td>
                        <td><span class="badge">${s.department}</span></td>
                        <td>Year ${s.year}</td>
                    `;
                    list.appendChild(tr);
                });
            } catch (err) {
                console.error(err);
            }
        }

        // Form Submit
        document.getElementById('student-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const student = {
                name: document.getElementById('name').value,
                rollNumber: document.getElementById('rollNumber').value,
                department: document.getElementById('department').value,
                year: parseInt(document.getElementById('year').value)
            };

            try {
                const res = await fetch(`${API_BASE}/api/students`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(student)
                });

                if (res.ok) {
                    document.getElementById('student-form').reset();
                    fetchStudents();
                }
            } catch (err) {
                alert('Error enrolling student');
            }
        });

        // Init
        fetchInfo();
        fetchStudents();
    </script>
</body>
</html>
